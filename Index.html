
<html>
<head>
<title>SUBSONIC</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: radial-gradient(circle at center, #001f1f, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}

.container {
  padding: 50px;
  border-radius: 20px;
  background: rgba(0,0,0,0.8);
  box-shadow: 0 0 40px #00ffcc;
}

h1 {
  font-size: 48px;
  color: #00ffcc;
  letter-spacing: 4px;
  text-shadow: 0 0 20px #00ffcc;
}

.tagline {
  margin: 10px 0 30px;
  font-size: 18px;
  opacity: 0.8;
}

button {
  padding: 15px 30px;
  font-size: 20px;
  border: none;
  border-radius: 10px;
  background: #00ffcc;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  background: #00ccaa;
  transform: scale(1.1);
}

.instructions {
  margin-top: 25px;
  font-size: 14px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="container">
  <h1>SUBSONIC</h1>
  <div class="tagline">Outrun Everything.</div>

  <button onclick="startGame()">START</button>

</div>

<script>
function startGame() {
  window.location.href = "game.html";
}
</script>

</body>
</html>
